<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormularioDenuncia</title>
</head>
<body>
    <header>
        <img src="../Img/Icon/FaleFacil.png" alt="Logo">
    </header>
    <h2>IINFORMAÇÕES PESSOAIS</h2>
    <hr>
    <div id="InfoPessoal">
    <label for="nome">Nome:</label>
    <input type="text" placeholder="Opicional">
    <img src="../Img/Icon/Info.png" alt="Info">
    <label for="Setor">Setor:</label>
    <select name="SETOR" id="Setor">
        <option value=""></option>
    </select>        
    </div>
    <div id="ConfigProb">
        <h2>CONFIGURAÇÃO DO PROBLEMA</h2>
        <hr>
        <label for="Area">Área:</label>
        <select name="Area" id="Area">
            <option value=""></option>
        </select>
        <input type="text" placeholder="Área Do Problema Ocorrido">
        <label for="Urgencia">Urgência:</label>
        <select name="Urgencia" id="Urgen">
            <option value=""></option>
        </select>
        <input type="text" placeholder="Motivo da Urgência">
    </div>
    <div id="AreaProb">
        <h2>AREA DO PROBLEMA</h2>
        <label for="Titulo">Titulo: </label>
        <input type="text" placeholder="Tiulo do Problema">
        <img src="../Img/Icon/Info.png" alt="Info">
        <label for="Descricao">Descrição: </label>
        <input type="text" placeholder="Insira A Descrição do Problema....">
    </div>
</body>
</html>
