<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/FormuDenun.css">
    <script src="../JS/Formulario.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Formulario Denuncia</title>
</head>
<body>

    <header id="Logo">
        <img src="../Img/Icon/FaleFacil.png" alt="Logo">
    </header>

    <h2>INFORMAÇÕES PESSOAIS</h2>
    <hr>
    <div id="InfoRecla">
    <div id="InfoPessoal">
        <label>Nome:</label>
        <input id="NomOpic" name="nomeopc" type="text" placeholder="Opcional">
        <img class="IconIfon" src="../Img/Icon/Info.png" alt="Info">

        <label>Setor:</label>
        <input id="reclasetor" type="text" name="setor" placeholder="Digite seu setor">
        <img class="IconIfon" src="../Img/Icon/Info.png" alt="Info">
    </div>

    <div id="ConfigProb">
        <h2>CONFIGURAÇÃO DO PROBLEMA</h2>
        <hr>

        <label>Área:</label>
        <input  id="reclaarea" type="text" name="area" placeholder="Área do problema ocorrido">
        <img class="IconIfon" src="../Img/Icon/Info.png" alt="Info">

        <label>Urgência:</label>
        <input id="reclaurge" type="text" name="urgencia" placeholder="Motivo da urgência">
        <img class="IconIfon" src="../Img/Icon/Info.png" alt="Info">
    </div>

    <div id="AreaProb">
        <h2>AREA DO PROBLEMA</h2>
        <hr>

        <label>Título:</label>
        <input id="reclatitu" type="text" name="tituloDoProblema" placeholder="Título do problema">
        <img class="IconIfon" src="../Img/Icon/Info.png" alt="Info">

        <label>Descrição:</label>
        <textarea id="recladesc" name="descricao" placeholder="Insira a descrição do problema..."></textarea>
    </div>

    <div class="PossBtn">
        <a href="Cadastro.html">
        <button class="BtnForm" href="Cadastro.html" >Sair</button>            
        </a>

        <a href="HistoricoFuncionario.html">
        <button class="BtnForm">Histórico</button>            
        </a>

        <button id="submit" class="BtnForm">Enviar</button>
    </div>

    </div>

</body>
</html>
