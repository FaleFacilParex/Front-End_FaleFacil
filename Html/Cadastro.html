<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaleFacilCadastro</title>
    <link rel="stylesheet" href="../Css/StyleCadastro.css">
    <script src="../JS/Cadastro.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="Card_inf">
        
        <div id="Fale_box">
            <h2 id="Fale_card">FALE</h2>
        </div>

        <h1 id="Facil_card">FÁCIL</h1>        

        <div class="Logo_Parex">
            <img src="../Img/image 4.png" alt="Logo_Parex">
        </div>
    </header>


    <div class="Card">

        <section>

            <header id="box_log">
                <p>Register</p>
                <nav class="NavCad">
                    <div id="Nav_box">
                        <a href="#" id="Option_re">Register</a>
                        <a href="#" id="Option">Login</a>
                    </div>
                </nav>

                <div class="Inf_cadast">
                    <div class="campo_user">
                        <div class="campo">
                            <label for="email">Email:</label>
                            <input type="text" id="email">
                        </div>

                        <div class="campo">
                            <label for="re">RE:</label>
                            <input type="text" id="re">
                        </div>

                        <div class="campo">
                            <label for="senha">Senha:</label>
                            <input type="password" id="senha">
                        </div>

                        <div class="campo_singup">
                            <nav class="Sing_box">
                                <a id="Signup" href="#">Sign Up</a>
                            </nav>
                        </div>

                    </div>
            </header>

        </section>
        <div id="boll_1"></div>
        <div id="boll_2"></div>
        <div id="boll_3"></div>
        <div id="boll_4"></div>
    </div>

</body>

</html>
