<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirme Email</title>
    <link rel="stylesheet" href="../Css/ConfirmeEmail.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="../JS/ConfirmarEmail.js" defer></script>
</head>
<body>

    <div class="container">
        <form class="card" id="formConfirmeEmail">

            <img class="imgsFale" src="../imgs/FaleFacil.png" alt="Logo">

            <h1>Confirme seu Email</h1>

            <div class="campo">
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>

            <div class="campo">
                <label>Confirmar Email:</label>
                <input type="email" id="confirmarEmail" required>
            </div>

            <p id="mensagemStatus" class="mensagem-status"></p>

            <button type="submit" id="btnConfirmar">Confirmar</button>

        </form>
    </div>

    

</body>
</html>
