<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/ConfirmarSenha.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="../JS/ConfirmarSenha.js" defer></script>
    <title>ConfirmarSenha</title>
</head>
<body>
    
    <div class="container">
        <form class="card" id="formRedefinirSenha">

            <img class="imgsFale" src="../imgs/FaleFacil.png" alt="Logo">

            <h1>Confirme sua Senha</h1>

            <div class="campo">
                <label for="novaSenha">Senha:</label>
                <input type="password" id="novaSenha" required>
            </div>

            <div class="campo">
                <label for="confirmarSenha">Confirmar Senha:</label>
                <input type="password" id="confirmarSenha" required>
            </div>

            <p id="mensagemStatus" class="mensagem-status"></p>

            <button type="submit" id="btnConfirmar">Confirmar</button>

        </form>
    </div>

    
</body>
</html>
